<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弘茗智能科技 | Furry大学生硬核创新团队</title>
    <link rel="stylesheet" href="css/stylesheet.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo">
            <!-- 临时LOGO占位 -->
            <img src="img/HongMing_Logo.jpg" alt="弘茗智能科技logo">
            <div class="logo-text">弘茗智能科技</div>
        </div>
        <div class="nav-links">
            <a href="#products">产品方案</a>
            <a href="#tech">技术领域</a>
            <a href="#about">关于我们</a>
            <a href="#join">加入团队</a>
            <a href="#">EN</a>
        </div>
    </nav>

    <!-- 主视觉区容器 -->
    <div class="hero-container">
        <!-- 主视觉区1 -->
        <section class="hero active" style="background-image: url('https://picsum.photos/1920/1080?random=1');">
            <div class="hero-content">
                <h1 class="hero-title">用<span>学生创新</span>重新定义智能科技</h1>
                <p class="hero-subtitle">
                    来自校园的硬核研发团队，专注计算机视觉与机电一体化技术。<br>
                    正在开发吸附式隧道检测机器人与兽装电子眼系统。
                </p>
                <a href="#products" class="cta-button">查看我们的项目</a>
            </div>
        </section>
        <!-- 主视觉区2 -->
        <section class="hero" style="background-image: url('https://picsum.photos/1920/1080?random=2');">
            <div class="hero-content">
                <h1 class="hero-title">创新驱动，引领科技未来</h1>
                <p class="hero-subtitle">
                    不断探索智能科技的边界，为行业带来新的突破。<br>
                    携手共创美好明天。
                </p>
                <a href="#products" class="cta-button">了解更多</a>
            </div>
        </section>
    </div>


    <section class="products" id="products">
        <h2 class="section-title">我们的创新产品</h2>
        <!-- 产品卡片将通过JS动态加载 -->
        <div id="product-container"></div>
    </section>

    <section class="tech" id="tech">
        <h2 class="section-title">技术领域</h2>

    </section>

    <script>
        // 动态加载产品数据
        const products = [
            {
                title: "吸附式隧道检测机器人",
                desc: "基于YOLOv5的智能检测系统，可在复杂曲面自主行走",
                features: ["98.7%识别准确率", "碳纤维轻量化结构", "IP67防护等级"],
                color: "#1A6DFF"
            },
            {
                title: "兽装电子眼系统",
                desc: "开源可编程的智能交互眼睛解决方案",
                features: ["30ms低延迟", "12种情感模式", "模块化设计"],
                color: "#FF6D1A"
            }
        ];

        // 产品卡片渲染函数
        function renderProducts() {
            const container = document.getElementById('product-container');
            let html = '';

            products.forEach(product => {
                html += `
                <div class="product-card" style="border-top: 5px solid ${product.color}">
                    <h3>${product.title}</h3>
                    <p>${product.desc}</p>
                    <ul>
                        ${product.features.map(f => `<li>${f}</li>`).join('')}
                    </ul>
                </div>
                `;
            });

            container.innerHTML = html;
        }

        // 主视觉区切换函数
        let currentIndex = 0;
        const heroSections = document.querySelectorAll('.hero');

        function switchHero() {
            heroSections[currentIndex].classList.remove('active');
            currentIndex = (currentIndex + 1) % heroSections.length;
            heroSections[currentIndex].classList.add('active');
        }

        // 定时切换主视觉区
        setInterval(switchHero, 5000);

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', () => {
            renderProducts();

            // 平滑滚动
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    document.querySelector(this.getAttribute('href')).scrollIntoView({
                        behavior: 'smooth'
                    });
                });
            });
        });
    </script>
</body>

</html>
