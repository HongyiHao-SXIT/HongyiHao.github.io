## Git and GitHub

Git is essential version control software used widely in industry and research.
![Git Logo](images/How_to_starting/git_logo.png)


### What is Git?
Git is a **distributed version control system** created by Linus Torvalds that:
✔ Tracks file changes  
✔ Enables collaboration  
✔ Allows version reverting  
✔ Manages project versions  

Each Git directory is a complete repository with full history.

### Key Features

#### 1. Version Control
- Records file changes over time
- Reverts to previous states
- Tracks change authorship

#### 2. Branching & Merging
- Isolated feature branches
- Safe branch merging
- Conflict resolution

#### 3. Distributed Development
- Full local history
- Offline work capability
- Multiple remote repos

#### 4. Integrity & Security
- SHA-1 hash tracking
- Tamper-evident commits

### Core Concepts

| Term | Description |
|------|-------------|
| Repository | Git-tracked project folder |
| Commit | Change snapshot |
| Branch | Development line |
| Clone | Remote repo copy |
| Fork | Personal project copy |
| Merge | Branch combination |
| Pull Request | Merge proposal |

### Installation

1. **Windows**: [Download installer](https://git-scm.com/download/win)
2. **Mac**: \`brew install git\` or [download](https://git-scm.com/download/mac)
3. **Linux**:
   - Debian/Ubuntu: \`sudo apt install git\`
   - Fedora: \`sudo dnf install git\`

### Basic Commands

\`\`\`bash
#### Initialize repository
git init

#### Check status
git status

#### Stage changes
git add <file>
git add .

#### Commit changes
git commit -m "Message"

#### Connect to remote
git remote add origin <url>

#### Push changes
git push -u origin <branch>
git push

#### Pull changes
git pull origin <branch>

#### Clone repository
git clone <url>
\`\`\`

🚀 **Efficiency**: Transfers only changes  
🔒 **Safety**: No single failure point  
🌍 **Collaboration**: Enables open source  
⏱ **Accountability**: Tracks all changes
